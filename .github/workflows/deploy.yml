name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production VPS

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e

            echo "=== Starting Deployment ==="
            echo "Time: $(date)"

            # Check DNS reachability
            echo ">>> Checking internet connectivity..."
            if ! ping -c 1 github.com >/dev/null 2>&1; then
              echo ">>> github.com not reachable, attempting to fix DNS..."
              echo "${{ secrets.VPS_PASSWORD }}" | sudo -S bash -c "echo 'nameserver 8.8.8.8' > /etc/resolv.conf"
            fi

            # Navigate to bench directory
            cd ${{ secrets.BENCH_PATH }}

            # Pull latest code for dressup app
            echo ">>> Pulling latest code..."
            rm -rf apps/dressup || true
            bench get-app --branch main https://github.com/sadikhossainnub/dressup.git


            # Run migrations
            echo ">>> Running migrations..."
            bench --site erp.dressup.com.bd migrate

            # Clear cache
            echo ">>> Clearing cache..."
            bench --site erp.dressup.com.bd clear-cache

            # Restart bench
            echo ">>> Restarting bench..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S supervisorctl restart all

            echo "=== Deployment Complete ==="
            echo "Time: $(date)"
